<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yardy Rum Bar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Yardy Rum Bar</h1>
    <p>Interactive Rum Shelf</p>
  </header>

  <main>
    <section class="hero">
      <p>Click the shelf image to reveal rum info.</p>
      <img src="shelf.jpeg" alt="Rum shelf" id="shelf-image" />
      <button id="show-btn">Show Rum Info</button>
    </section>

    <section id="rum-info" class="hidden">
      <h2>Rum Notes</h2>
      <p id="rum-text">Rum details will appear here.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
