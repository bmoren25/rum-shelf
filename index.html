<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yardy Rum Bar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Yardy Rum Bar</h1>
    <p>Interactive Rum Shelf</p>
  </header>

  <main>
    <section class="intro">
      <h2>Explore the Shelf</h2>
      <p>Click a bottle on the shelf to learn more about it.</p>
    </section>

    <section class="shelf-section">
      <img
        src="shelf.jpeg"
        alt="Rum shelf"
        class="shelf-image"
        usemap="#rumshelf"
      />

      <map name="rumshelf">
        <!-- Appleton 12 top shelf -->
        <area
          shape="rect"
          coords="680,40,740,180"
          href="appleton12.html"
          alt="Appleton Estate 12 Year"
        />

        <!-- Wray & Nephew middle shelf -->
        <area
          shape="rect"
          coords="865,255,915,380"
          href="wraynephew.html"
          alt="Wray and Nephew"
        />

        <!-- Rum Fire middle shelf -->
        <area
          shape="rect"
          coords="920,255,970,380"
          href="rumfire.html"
          alt="Rum Fire"
        />
      </map>
    </section>
  </main>
</body>
</html>
